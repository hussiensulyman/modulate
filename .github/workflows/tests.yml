name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['10.*', '11.*']
        exclude:
          - php: '8.4'
            laravel: '10.*'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Determine Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-
            ${{ runner.os }}-composer-${{ matrix.php }}-
            ${{ runner.os }}-composer-

      - name: Set Laravel/Testbench constraints
        run: |
          if [ "${{ matrix.laravel }}" = "10.*" ]; then
            composer require --no-update "illuminate/support:10.*"
            composer require --dev --no-update "orchestra/testbench:^8.0"
          else
            composer require --no-update "illuminate/support:11.*"
            composer require --dev --no-update "orchestra/testbench:^9.0"
          fi

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Verify coverage driver
        run: composer run coverage:check

      - name: Run Pest with coverage
        run: ./vendor/bin/pest --coverage-clover=coverage.xml --fail-on-warning --fail-on-risky --fail-on-deprecation

      - name: Run ViolationScanner lint filter
        run: ./vendor/bin/pest --filter ViolationScanner --fail-on-warning --fail-on-risky --fail-on-deprecation

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: false
